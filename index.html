<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquete</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 32px;
      line-height: 1.2;
    }

    .subinfo {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      text-align: center;
      font-weight: bold;
      font-size: 22px;
    }

    .nao-iniciada {
      color: #facc15;
    }

    .em-andamento {
      color: #4ade80;
    }

    .finalizada {
      color: #f87171;
    }

    .opcao {
      background: #334155;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .opcao:hover {
      background: #3f4e64;
    }

    .opcao.desabilitada {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .opcao.selecionada {
      border: 2px solid #60a5fa;
      background: #475569;
    }

    .texto-opcao {
      font-size: 16px;
    }

    .votos {
      font-weight: bold;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 17px;
      font-weight: bold;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover:enabled {
      background: #2563eb;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .voltar {
      background: transparent;
      border: 1px solid #475569;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
    }

    .voltar:hover {
      background: rgba(255,255,255,0.06);
    }

    .mensagem {
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
      min-height: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 22px;
      }

      h1 {
        font-size: 26px;
      }

      .status {
        font-size: 18px;
      }

      .opcao {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <a class="voltar" href="lista.html">← Voltar para lista</a>
    </div>

    <h1 id="titulo">Carregando...</h1>

    <div class="subinfo">
      <div><strong>Início:</strong> <span id="dataInicio">-</span></div>
      <div><strong>Fim:</strong> <span id="dataFim">-</span></div>
    </div>

    <div class="status" id="status">Carregando status...</div>

    <div id="opcoes"></div>

    <button id="btnVotar" onclick="votar()">Votar</button>

    <div class="mensagem" id="mensagem"></div>
  </div>

  <script>
    let opcaoSelecionada = null;
    let enqueteAtiva = false;

    const params = new URLSearchParams(window.location.search);
    const enqueteId = params.get('id') || 1;

    function formatarData(data) {
      const d = new Date(data);
      return d.toLocaleString('pt-BR');
    }

    function carregarEnquete() {
      fetch(`http://localhost:3000/enquetes/${enqueteId}`)
        .then(res => res.json())
        .then(data => {
          if (!data.enquete.length) {
            document.getElementById('titulo').innerText = 'Enquete não encontrada';
            document.getElementById('status').innerText = '';
            document.getElementById('opcoes').innerHTML = '';
            document.getElementById('btnVotar').disabled = true;
            document.getElementById('mensagem').innerText = '';
            return;
          }

          const enquete = data.enquete[0];
          const opcoes = data.opcoes;

          document.getElementById('titulo').innerText = enquete.titulo;
          document.getElementById('dataInicio').innerText = formatarData(enquete.data_inicio);
          document.getElementById('dataFim').innerText = formatarData(enquete.data_fim);

          const agora = new Date();
          const inicio = new Date(enquete.data_inicio);
          const fim = new Date(enquete.data_fim);

          let status = 'Não iniciada';
          let statusClasse = 'nao-iniciada';
          enqueteAtiva = false;

          if (agora >= inicio && agora <= fim) {
            status = 'Em andamento';
            statusClasse = 'em-andamento';
            enqueteAtiva = true;
          } else if (agora > fim) {
            status = 'Finalizada';
            statusClasse = 'finalizada';
          }

          const statusEl = document.getElementById('status');
          statusEl.innerText = status;
          statusEl.className = `status ${statusClasse}`;

          const opcoesDiv = document.getElementById('opcoes');
          opcoesDiv.innerHTML = '';

          opcoes.forEach(opcao => {
            const div = document.createElement('div');
            div.className = 'opcao';

            if (!enqueteAtiva) {
              div.classList.add('desabilitada');
            }

            if (opcaoSelecionada === opcao.id) {
              div.classList.add('selecionada');
            }

            div.innerHTML = `
              <span class="texto-opcao">${opcao.texto}</span>
              <span class="votos">${opcao.votos} voto(s)</span>
            `;

            div.onclick = () => {
              if (!enqueteAtiva) return;

              opcaoSelecionada = opcao.id;
              carregarEnquete();
            };

            opcoesDiv.appendChild(div);
          });

          document.getElementById('btnVotar').disabled = !enqueteAtiva;

          if (!enqueteAtiva) {
            document.getElementById('mensagem').innerText = 'A votação está desabilitada porque a enquete não está ativa.';
          } else {
            document.getElementById('mensagem').innerText = 'Selecione uma opção e clique em votar.';
          }
        })
        .catch(() => {
          document.getElementById('titulo').innerText = 'Erro ao carregar enquete';
          document.getElementById('status').innerText = '';
          document.getElementById('btnVotar').disabled = true;
          document.getElementById('mensagem').innerText = 'Não foi possível carregar a enquete.';
        });
    }

    function votar() {
      if (!enqueteAtiva) {
        alert('A enquete não está ativa para votação.');
        return;
      }

      if (!opcaoSelecionada) {
        alert('Selecione uma opção antes de votar.');
        return;
      }

      fetch(`http://localhost:3000/enquetes/votar/${opcaoSelecionada}`, {
        method: 'POST'
      })
      .then(res => res.json())
      .then(resposta => {
        if (resposta.erro) {
          alert(resposta.erro);
          return;
        }

        alert('Voto computado com sucesso.');
        opcaoSelecionada = null;
        carregarEnquete();
      })
      .catch(() => {
        alert('Erro ao votar.');
      });
    }

    carregarEnquete();
    setInterval(carregarEnquete, 3000);
  </script>
</body>
</html>
